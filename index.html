<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ---- Astrology data ----
const ZODIAC = [
  { sign: 'Capricorn', symbol: '\u2651', element: 'Earth', modality: 'Cardinal', planet: 'Saturn', startM: 1, startD: 1, endM: 1, endD: 19 },
  { sign: 'Aquarius', symbol: '\u2652', element: 'Air', modality: 'Fixed', planet: 'Uranus', startM: 1, startD: 20, endM: 2, endD: 18 },
  { sign: 'Pisces', symbol: '\u2653', element: 'Water', modality: 'Mutable', planet: 'Neptune', startM: 2, startD: 19, endM: 3, endD: 20 },
  { sign: 'Aries', symbol: '\u2648', element: 'Fire', modality: 'Cardinal', planet: 'Mars', startM: 3, startD: 21, endM: 4, endD: 19 },
  { sign: 'Taurus', symbol: '\u2649', element: 'Earth', modality: 'Fixed', planet: 'Venus', startM: 4, startD: 20, endM: 5, endD: 20 },
  { sign: 'Gemini', symbol: '\u264A', element: 'Air', modality: 'Mutable', planet: 'Mercury', startM: 5, startD: 21, endM: 6, endD: 20 },
  { sign: 'Cancer', symbol: '\u264B', element: 'Water', modality: 'Cardinal', planet: 'Moon', startM: 6, startD: 21, endM: 7, endD: 22 },
  { sign: 'Leo', symbol: '\u264C', element: 'Fire', modality: 'Fixed', planet: 'Sun', startM: 7, startD: 23, endM: 8, endD: 22 },
  { sign: 'Virgo', symbol: '\u264D', element: 'Earth', modality: 'Mutable', planet: 'Mercury', startM: 8, startD: 23, endM: 9, endD: 22 },
  { sign: 'Libra', symbol: '\u264E', element: 'Air', modality: 'Cardinal', planet: 'Venus', startM: 9, startD: 23, endM: 10, endD: 22 },
  { sign: 'Scorpio', symbol: '\u264F', element: 'Water', modality: 'Fixed', planet: 'Pluto', startM: 10, startD: 23, endM: 11, endD: 21 },
  { sign: 'Sagittarius', symbol: '\u2650', element: 'Fire', modality: 'Mutable', planet: 'Jupiter', startM: 11, startD: 22, endM: 12, endD: 21 },
  { sign: 'Capricorn', symbol: '\u2651', element: 'Earth', modality: 'Cardinal', planet: 'Saturn', startM: 12, startD: 22, endM: 12, endD: 31 },
];

function getSunSign(month, day) {
  for (const z of ZODIAC) {
    if ((month === z.startM && day >= z.startD) || (month === z.endM && day <= z.endD)) {
      return z;
    }
  }
  return ZODIAC[0]; // fallback Capricorn
}

function getLifePath(day, month, year) {
  const str = String(day) + String(month) + String(year);
  let sum = 0;
  for (const ch of str) sum += parseInt(ch);
  while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
    let s = 0;
    for (const ch of String(sum)) s += parseInt(ch);
    sum = s;
  }
  return sum;
}

function getPersonalYear2026(day, month) {
  const str = String(day) + String(month) + '2026';
  let sum = 0;
  for (const ch of str) sum += parseInt(ch);
  while (sum > 9 && sum !== 11 && sum !== 22) {
    let s = 0;
    for (const ch of String(sum)) s += parseInt(ch);
    sum = s;
  }
  return sum;
}

// Approximate moon sign (very rough — based on day of month cycle)
function getApproxMoonSign(day, month, year) {
  // Moon moves ~13 degrees/day, completes zodiac in ~27.3 days
  // This is an approximation — real moon sign needs ephemeris
  const signs = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
  const jd = Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day - 1524.5;
  const moonLong = (jd * 13.176396 + 93.272) % 360;
  const idx = Math.floor(moonLong / 30);
  return signs[idx % 12];
}

function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    paymentSuccess: params.get('payment') === 'success',
    sessionId: params.get('session_id'),
    birthDay: params.get('bd') ? parseInt(params.get('bd')) : null,
    birthMonth: params.get('bm') ? parseInt(params.get('bm')) : null,
    birthYear: params.get('by') ? parseInt(params.get('by')) : null,
  };
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ---- Cosmic Card Canvas ----
function drawCosmicCard(canvas, { sign, symbol, lifePath, element }) {
  const ctx = canvas.getContext('2d');
  const w = 600, h = 600;
  canvas.width = w; canvas.height = h;

  // Dark gradient background
  const grad = ctx.createRadialGradient(w/2, w/2, 50, w/2, w/2, 400);
  grad.addColorStop(0, '#151530');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Star dots
  for (let i = 0; i < 80; i++) {
    const x = Math.random() * w;
    const y = Math.random() * h;
    const r = Math.random() * 1.5 + 0.5;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.5 + 0.1})`;
    ctx.fill();
  }

  // Gold circle ring
  ctx.beginPath();
  ctx.arc(w/2, 260, 130, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(212,175,55,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Large zodiac unicode symbol
  ctx.font = '120px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#d4af37';
  ctx.fillText(symbol, w/2, 250);

  // Sign name
  ctx.font = 'bold 28px Georgia, serif';
  ctx.fillStyle = '#d4af37';
  ctx.fillText(sign, w/2, 400);

  // Life path number
  ctx.font = '16px "Source Sans 3", sans-serif';
  ctx.fillStyle = '#9b7fe8';
  ctx.fillText(`Life Path ${lifePath}`, w/2, 435);

  // Element
  ctx.font = '13px "Source Sans 3", sans-serif';
  ctx.fillStyle = 'rgba(200,200,212,0.5)';
  ctx.fillText(element + ' Sign', w/2, 465);

  // Border
  ctx.strokeStyle = 'rgba(212,175,55,0.4)';
  ctx.lineWidth = 2;
  ctx.strokeRect(16, 16, w-32, h-32);

  // Brand
  ctx.font = '11px "Source Sans 3", sans-serif';
  ctx.fillStyle = 'rgba(200,200,212,0.3)';
  ctx.fillText('sacredchart.com', w/2, h - 32);
}

function EmailCapture({ birthData, onCapture }) {
  const [email, setEmail] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    if (!email || !email.includes('@')) return;
    setSubmitting(true);
    try {
      await fetch('/api/capture-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email,
          birth_day: birthData.day,
          birth_month: birthData.month,
          birth_year: birthData.year,
          sun_sign: birthData.sunSign,
          life_path_number: birthData.lifePath,
        }),
      });
    } catch (_) {}
    setDone(true);
    setSubmitting(false);
    setTimeout(() => onCapture(email), 600);
  }

  if (done) {
    return (
      <div style={{ textAlign: 'center', padding: '16px', color: 'var(--gold)' }}>
        Saved. Your cosmic blueprint awaits below.
      </div>
    );
  }

  return (
    <div className="email-card">
      <div className="label">Save your reading</div>
      <div className="title">Get your free sections emailed to you</div>
      <div className="desc">Plus early access to full Cosmic Blueprint readings when they launch.</div>
      <form className="email-form" onSubmit={handleSubmit}>
        <input className="email-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" required />
        <button className="email-submit" type="submit" disabled={submitting}>{submitting ? '...' : 'Save'}</button>
      </form>
      <div className="email-fine">No spam. Unsubscribe anytime.</div>
    </div>
  );
}

function CosmicCardCanvas({ signData, lifePath, blurred }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (canvasRef.current && signData) {
      drawCosmicCard(canvasRef.current, {
        sign: signData.sign,
        symbol: signData.symbol,
        lifePath,
        element: signData.element,
      });
    }
  }, [signData, lifePath]);

  return (
    <div className={'cosmic-card-wrap' + (blurred ? ' cosmic-card-blurred' : '')}>
      <canvas ref={canvasRef} style={{ width: '300px', height: '300px' }} />
      <div className="cosmic-card-label">
        {blurred ? 'Your Cosmic Card — unlock with full reading' : 'Your Cosmic Card'}
      </div>
    </div>
  );
}

function PaywallCard({ birthData }) {
  const linkMeta = document.querySelector('meta[name="stripe-payment-link"]');
  const paymentLink = linkMeta ? linkMeta.content : 'STRIPE_LINK_PLACEHOLDER';
  const isPlaceholder = paymentLink === 'STRIPE_LINK_PLACEHOLDER' || paymentLink === '#';

  const successUrl = encodeURIComponent(
    window.location.origin + '/?payment=success&session_id={CHECKOUT_SESSION_ID}'
    + '&bd=' + birthData.day + '&bm=' + birthData.month + '&by=' + birthData.year
  );
  const fullLink = isPlaceholder ? '#' : `${paymentLink}?client_reference_id=cb_${birthData.day}_${birthData.month}_${birthData.year}&success_url=${successUrl}`;

  const sections = [
    'Moon Sign Depth — your hidden emotional world',
    'Personal Year 2026 — what this year holds for you',
    'Elemental Blueprint — your cosmic composition',
    'Cosmic Strengths & Shadows — your duality map',
    'Cosmic Edge — your unique power move right now',
    'Cosmic Card — your personalized visual sigil',
  ];

  return (
    <div className="paywall-card">
      <h2>Unlock Your Full Cosmic Blueprint</h2>
      <p>You have seen your Sun and Life Path. Now go deeper into the forces that shape your inner world, your year ahead, and your cosmic edge.</p>
      <div className="paywall-sections">
        {sections.map((s, i) => (
          <div key={i} className="paywall-item">
            <span className="check">&#10003;</span>
            <span>{s}</span>
          </div>
        ))}
      </div>
      <div className="price-badge">
        <span className="currency">$</span>
        <span className="amount">9</span>
        <span className="per">one-time</span>
      </div>
      {isPlaceholder ? (
        <div style={{ padding: '14px', background: 'var(--purple-dim)', borderRadius: '10px', color: 'var(--purple)', fontWeight: 600 }}>
          Coming soon — join the waitlist above
        </div>
      ) : (
        <a href={fullLink} className="pay-btn">Reveal My Full Blueprint</a>
      )}
      <div className="paywall-disclaimer">Instant delivery. No subscription. Powered by AI astrology.</div>
    </div>
  );
}

// ---- Main App ----
function App() {
  const [state, setState] = useState('idle'); // idle, loading, free_shown, email_captured, paid
  const [day, setDay] = useState('');
  const [month, setMonth] = useState('');
  const [year, setYear] = useState('');
  const [birthTime, setBirthTime] = useState('');
  const [report, setReport] = useState(null);
  const [error, setError] = useState(null);
  const [birthData, setBirthData] = useState(null);

  // Check for payment return
  useEffect(() => {
    const params = getUrlParams();
    if (params.paymentSuccess && params.sessionId && params.birthDay && params.birthMonth && params.birthYear) {
      setDay(String(params.birthDay));
      setMonth(String(params.birthMonth));
      setYear(String(params.birthYear));

      const signData = getSunSign(params.birthMonth, params.birthDay);
      const lp = getLifePath(params.birthDay, params.birthMonth, params.birthYear);
      const py = getPersonalYear2026(params.birthDay, params.birthMonth);
      const moonApprox = getApproxMoonSign(params.birthDay, params.birthMonth, params.birthYear);

      const bd = {
        day: params.birthDay, month: params.birthMonth, year: params.birthYear,
        sunSign: signData.sign, sunSymbol: signData.symbol,
        sunElement: signData.element, sunModality: signData.modality, sunPlanet: signData.planet,
        lifePath: lp, personalYear: py, moonApprox, signData,
      };
      setBirthData(bd);
      setState('loading');

      fetch('/api/verify-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: params.sessionId,
          birth_day: params.birthDay,
          birth_month: params.birthMonth,
          birth_year: params.birthYear,
          sun_sign: signData.sign,
          life_path_number: lp,
        }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) { setError(data.error); setState('idle'); }
        else { setReport(data); setState('paid'); }
      })
      .catch(() => { setError('Payment verification failed. Please try again.'); setState('idle'); });

      // Clean URL
      window.history.replaceState({}, '', '/');
    }
  }, []);

  async function handleSubmit(e) {
    e.preventDefault();
    const d = parseInt(day), m = parseInt(month), y = parseInt(year);
    if (!d || !m || !y) return;

    const signData = getSunSign(m, d);
    const lp = getLifePath(d, m, y);
    const py = getPersonalYear2026(d, m);
    const moonApprox = getApproxMoonSign(d, m, y);

    const bd = {
      day: d, month: m, year: y,
      sunSign: signData.sign, sunSymbol: signData.symbol,
      sunElement: signData.element, sunModality: signData.modality, sunPlanet: signData.planet,
      lifePath: lp, personalYear: py, moonApprox, signData,
    };
    setBirthData(bd);
    setState('loading');
    setError(null);

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          day: d, month: m, year: y,
          sun_sign: signData.sign,
          sun_element: signData.element,
          sun_modality: signData.modality,
          sun_planet: signData.planet,
          life_path: lp,
          moon_sign_approx: moonApprox,
          personal_year_2026: py,
          sections: 'free',
        }),
      });
      const data = await res.json();
      if (data.error) { setError(data.error); setState('idle'); }
      else { setReport(data); setState('free_shown'); }
    } catch {
      setError('Something went wrong. Please try again.');
      setState('idle');
    }
  }

  function handleEmailCapture() {
    setState('email_captured');
  }

  function handleReset() {
    setState('idle');
    setReport(null);
    setError(null);
    setBirthData(null);
    setDay(''); setMonth(''); setYear('');
  }

  const isPaid = state === 'paid';

  return (
    <React.Fragment>
      <header className="site-header">
        <div className="container">
          <div className="logo-mark">&#10026;</div>
          <div className="logo-text">SacredChart</div>
        </div>
      </header>

      <div className="container">
        {state === 'idle' && (
          <React.Fragment>
            <section className="hero">
              <div className="hero-eyebrow">Astrology + Numerology + AI</div>
              <h1>Your Cosmic <em>Blueprint</em></h1>
              <div className="hero-sub">Enter your birthday. Receive a reading that feels like it was written by someone who has known you your whole life.</div>
              <div className="hero-tagline">Sun sign. Life Path. Moon sign. Cosmic Card. All from one date.</div>
            </section>

            <form className="input-card" onSubmit={handleSubmit}>
              <label className="input-label">Your Birthday</label>
              <div className="input-row">
                <select className="cosmic-select" value={day} onChange={e => setDay(e.target.value)} required>
                  <option value="">Day</option>
                  {Array.from({length:31}, (_,i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                </select>
                <select className="cosmic-select" value={month} onChange={e => setMonth(e.target.value)} required>
                  <option value="">Month</option>
                  {MONTHS.map((m,i) => <option key={i+1} value={i+1}>{m}</option>)}
                </select>
                <select className="cosmic-select" value={year} onChange={e => setYear(e.target.value)} required>
                  <option value="">Year</option>
                  {Array.from({length:61}, (_,i) => <option key={2010-i} value={2010-i}>{2010-i}</option>)}
                </select>
              </div>
              <label className="input-label" style={{marginTop: '12px'}}>Birth Time (optional)</label>
              <div className="input-row time-row">
                <input className="cosmic-input" type="time" value={birthTime} onChange={e => setBirthTime(e.target.value)} placeholder="HH:MM" />
              </div>
              <div className="time-hint">Birth time refines your Moon sign. Leave blank for an approximation.</div>
              <button className="submit-btn" type="submit">Reveal My Blueprint</button>
            </form>

            {error && <div className="error-card">{error}</div>}
          </React.Fragment>
        )}

        {state === 'loading' && (
          <div className="loading-state">
            <div className="cosmic-spinner" />
            <p>Reading the stars for you...</p>
            <div className="loading-detail">Calculating your cosmic blueprint</div>
          </div>
        )}

        {(state === 'free_shown' || state === 'email_captured' || state === 'paid') && report && birthData && (
          <div className="report-container">
            <div className="report-header">
              <div className="zodiac-symbol">{birthData.sunSymbol}</div>
              <div className="sign-name">{birthData.sunSign}</div>
              <div className="life-path-label">Life Path {birthData.lifePath}</div>
              <div className="birth-info">
                {MONTHS[birthData.month - 1]} {birthData.day}, {birthData.year}
                {' '}&middot;{' '}{birthData.sunElement} &middot; {birthData.moonApprox} Moon (approx)
              </div>
            </div>

            {/* Free sections */}
            <SectionCard number={1} title="Sun Sign Energy" data={report.report?.sun_sign_energy} />
            <SectionCard number={2} title="Life Path Number" data={report.report?.life_path_number} />

            {/* Email capture gate */}
            {state === 'free_shown' && (
              <EmailCapture birthData={birthData} onCapture={handleEmailCapture} />
            )}

            {/* Cosmic Card (blurred if not paid) */}
            <CosmicCardCanvas signData={birthData.signData} lifePath={birthData.lifePath} blurred={!isPaid} />

            {/* Paywall or paid sections */}
            {!isPaid && (
              <PaywallCard birthData={birthData} />
            )}

            {isPaid && (
              <React.Fragment>
                <SectionCard number={3} title="Moon Sign Depth" data={report.report?.moon_sign_depth} />
                <SectionCard number={4} title="Personal Year 2026" data={report.report?.personal_year_2026} />
                <SectionCard number={5} title="Elemental Blueprint" data={report.report?.elemental_blueprint} />
                <SectionCard number={6} title="Cosmic Strengths & Shadows" data={report.report?.cosmic_strengths_shadows} />
                <SectionCard number={7} title="Cosmic Edge" data={report.report?.cosmic_edge} />
              </React.Fragment>
            )}

            <div className="report-actions">
              <button className="action-btn" onClick={handleReset}>New Reading</button>
            </div>
          </div>
        )}
      </div>

      <footer className="site-footer">
        <div className="container">
          A <a href="https://thirtyonefifty.com">THIRTYONEFIFTY</a> venture.
          Information and entertainment only. Not professional advice of any kind.
        </div>
      </footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
